    <text x="85" y="48" text-anchor="middle" fill="white" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="24" font-weight="700">체크포인트</text>
    <text x="85" y="76" text-anchor="middle" fill="#FFE0E7" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14">승인 / 저장</text>
  </g>

  <path d="M240 164H285" stroke="#355070" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M455 164H500" stroke="#355070" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M670 164H715" stroke="#355070" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M885 164H930" stroke="#355070" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1015 236C930 300 760 312 615 298C450 282 315 236 270 212" stroke="#355070" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" marker-end="url(#arrow)"/>
  <text x="647" y="332" text-anchor="middle" fill="#4B5563" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="18" font-weight="600">반복</text>
